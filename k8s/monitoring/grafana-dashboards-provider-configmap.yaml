apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: storefront
        orgId: 1
        folder: Storefront
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 15
        options:
          path: /var/lib/grafana/dashboards
