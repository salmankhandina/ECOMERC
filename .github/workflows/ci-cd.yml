name: CI-CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check

      - name: Build Docker image
        run: docker build -t storefront-app:ci .

  build_and_push:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    outputs:
      image: ${{ steps.image_meta.outputs.full_image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image_meta
        run: |
          IMAGE_REPOSITORY="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_TAG="sha-${GITHUB_SHA}"
          echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "full_image=$IMAGE_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.event_name != 'pull_request'
    env:
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      DEPLOY_IMAGE: ${{ needs.build_and_push.outputs.image }}

    steps:
      - name: Checkout repository
        if: env.KUBE_CONFIG_DATA != ''
        uses: actions/checkout@v4

      - name: Set up kubectl
        if: env.KUBE_CONFIG_DATA != ''
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        if: env.KUBE_CONFIG_DATA != ''
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG_DATA" | base64 -d > "$HOME/.kube/config"

      - name: Apply base Kubernetes resources
        if: env.KUBE_CONFIG_DATA != ''
        run: kubectl apply -k k8s

      - name: Apply monitoring resources
        if: env.KUBE_CONFIG_DATA != ''
        run: kubectl apply -k k8s/monitoring

      - name: Update application image
        if: env.KUBE_CONFIG_DATA != ''
        run: kubectl set image deployment/storefront-app storefront-app="$DEPLOY_IMAGE" -n storefront

      - name: Wait for rollout
        if: env.KUBE_CONFIG_DATA != ''
        run: |
          kubectl rollout status deployment/mysql -n storefront --timeout=180s
          kubectl rollout status deployment/storefront-app -n storefront --timeout=180s
          kubectl rollout status deployment/prometheus -n storefront --timeout=180s
          kubectl rollout status deployment/grafana -n storefront --timeout=180s

      - name: Skip deploy when kubeconfig is missing
        if: env.KUBE_CONFIG_DATA == ''
        run: echo "KUBE_CONFIG_DATA secret is not configured, so the deploy stage was skipped."
